<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
     width="400" height="400" viewBox="0 0 400 400"
     id="svg_root">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:document-units="px" />
  <defs id="defs1" />
  <!-- Logo outer circle -->
  <circle
     id="logo_outer"
     style="fill:#2c3e50;stroke:none"
     cx="200"
     cy="200"
     r="150" />
  <!-- Logo inner circle -->
  <circle
     id="logo_inner"
     style="fill:#3498db;stroke:none"
     cx="200"
     cy="200"
     r="100" />
  <!-- Logo letter "A" -->
  <text
     id="logo_text"
     xml:space="preserve"
     style="font-size:120px;font-family:sans-serif;font-weight:bold;fill:#ffffff;text-anchor:middle"
     x="200"
     y="245">A</text>
  <!-- Decorative dots -->
  <circle
     id="dot1"
     style="fill:#e74c3c;stroke:none"
     cx="200"
     cy="60"
     r="12" />
  <circle
     id="dot2"
     style="fill:#2ecc71;stroke:none"
     cx="320"
     cy="280"
     r="12" />
  <circle
     id="dot3"
     style="fill:#f1c40f;stroke:none"
     cx="80"
     cy="280"
     r="12" />
</svg>
