<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Text with different alignments and styles for text tool tasks -->
    <text
       id="text_left"
       x="50"
       y="100"
       style="font-size:32px;font-family:sans-serif;fill:#000000;text-anchor:start">Left aligned text</text>
    <text
       id="text_center"
       x="400"
       y="220"
       style="font-size:36px;font-family:serif;fill:#0055aa;text-anchor:middle">Center aligned</text>
    <text
       id="text_right"
       x="750"
       y="340"
       style="font-size:28px;font-family:monospace;fill:#aa0000;text-anchor:end">Right aligned</text>
    <text
       id="text_italic"
       x="400"
       y="460"
       style="font-size:30px;font-family:sans-serif;fill:#006600;font-style:italic;text-anchor:middle">Italic text sample</text>
    <text
       id="text_multiline"
       x="400"
       y="540"
       style="font-size:24px;font-family:sans-serif;fill:#555555;text-anchor:middle">Plain text</text>
  </g>
</svg>
