<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- group1 contains two shapes grouped together -->
    <g id="group1">
      <rect
         id="inner_rect"
         x="150"
         y="150"
         width="150"
         height="100"
         style="fill:#00cc00;stroke:#000000;stroke-width:2" />
      <circle
         id="inner_circle"
         cx="500"
         cy="200"
         r="80"
         style="fill:#0000ff;stroke:#000000;stroke-width:2" />
    </g>
    <!-- standalone element outside group -->
    <rect
       id="outer_rect"
       x="300"
       y="420"
       width="200"
       height="80"
       style="fill:#ff9900;stroke:#333333;stroke-width:2" />
  </g>
</svg>
