<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
     width="800" height="600" viewBox="0 0 800 600"
     id="svg_root">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1.0"
     inkscape:pageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:document-units="px" />
  <defs id="defs1">
    <!-- Linear gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:1" />
    </linearGradient>
    <!-- Radial gradient -->
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </radialGradient>
    <!-- Blur filter -->
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
    <!-- Drop shadow filter -->
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    <!-- Clone source -->
    <circle id="clone_source" r="20" style="fill:#9b59b6;stroke:none" />
  </defs>
  <!-- Gradient rectangle -->
  <rect
     id="grad_rect"
     style="fill:url(#grad1);stroke:#333333;stroke-width:2"
     width="200"
     height="150"
     x="50"
     y="50"
     rx="15"
     ry="15"
     filter="url(#shadow1)" />
  <!-- Gradient circle -->
  <circle
     id="grad_circle"
     style="fill:url(#grad2);stroke:#333333;stroke-width:2"
     cx="500"
     cy="150"
     r="80" />
  <!-- Blurred ellipse -->
  <ellipse
     id="blurred_ellipse"
     style="fill:#e74c3c;stroke:none"
     cx="200"
     cy="400"
     rx="100"
     ry="50"
     filter="url(#blur1)" />
  <!-- Cloned circles -->
  <use xlink:href="#clone_source" x="450" y="350" id="clone1" />
  <use xlink:href="#clone_source" x="500" y="350" id="clone2" />
  <use xlink:href="#clone_source" x="550" y="350" id="clone3" />
  <use xlink:href="#clone_source" x="600" y="350" id="clone4" />
  <!-- Text with transformation -->
  <text
     id="rotated_text"
     xml:space="preserve"
     style="font-size:36px;font-family:sans-serif;fill:#2c3e50"
     x="400"
     y="500"
     transform="rotate(-15, 400, 500)">Inkscape Art</text>
</svg>
