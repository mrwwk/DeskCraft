<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <defs>
    <!-- Pre-defined linear gradient for demonstration -->
    <linearGradient id="grad_blue_red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Rectangle with existing gradient, for gradient editing task -->
    <rect
       id="grad_rect"
       x="100"
       y="100"
       width="600"
       height="200"
       style="fill:url(#grad_blue_red);stroke:#000000;stroke-width:2" />
    <!-- Plain rect for add radial gradient task -->
    <rect
       id="plain_rect"
       x="200"
       y="360"
       width="400"
       height="150"
       style="fill:#aaaaaa;stroke:#333333;stroke-width:2" />
  </g>
</svg>
