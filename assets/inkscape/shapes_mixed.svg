<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Ellipse for shape tool demonstration -->
    <ellipse
       id="ellipse1"
       cx="400"
       cy="200"
       rx="220"
       ry="120"
       style="fill:#ffcc00;stroke:#ff6600;stroke-width:4" />
    <!-- Regular polygon approximated as path (hexagon) -->
    <path
       id="hexagon_path"
       d="M 400,420 L 460,453 L 460,520 L 400,553 L 340,520 L 340,453 Z"
       style="fill:#cc00ff;stroke:#660099;stroke-width:3" />
    <!-- Line segment -->
    <line
       id="diagonal_line"
       x1="50"
       y1="50"
       x2="200"
       y2="200"
       style="stroke:#ff0000;stroke-width:5;stroke-linecap:round" />
  </g>
</svg>
