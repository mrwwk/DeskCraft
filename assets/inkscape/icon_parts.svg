<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Raw icon parts: a set of ungrouped primitive shapes meant to be
         composed into an app icon by the agent.
         Target: arrange into a circular icon with a centered symbol. -->
    <!-- Background circle (large, grey) -->
    <circle
       id="icon_bg"
       cx="200" cy="200" r="150"
       style="fill:#cccccc;stroke:#999999;stroke-width:3" />
    <!-- Inner symbol: a triangle pointing up (play button style) -->
    <path
       id="icon_triangle"
       d="M 500,100 L 600,250 L 400,250 Z"
       style="fill:#333333;stroke:none" />
    <!-- Decorative ring -->
    <circle
       id="icon_ring"
       cx="200" cy="450" r="100"
       style="fill:none;stroke:#666666;stroke-width:6" />
    <!-- Small accent dot -->
    <circle
       id="accent_dot"
       cx="650" cy="450" r="20"
       style="fill:#e74c3c;stroke:none" />
    <!-- Label text below -->
    <text
       id="icon_label"
       x="400" y="560"
       style="font-size:28px;font-family:sans-serif;fill:#333333;text-anchor:middle">MyApp Icon</text>
  </g>
</svg>
