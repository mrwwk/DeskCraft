<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="800"
   height="600"
   viewBox="0 0 800 600"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer1" />
  <g
     inkscape:label="Layer 1"
     inkscape:groupmode="layer"
     id="layer1">
    <!-- Three overlapping shapes; z-order (bottom to top in SVG) = large_rect, medium_circle, small_rect -->
    <rect
       id="large_rect"
       x="200"
       y="150"
       width="400"
       height="300"
       style="fill:#ccccff;stroke:#000000;stroke-width:2" />
    <circle
       id="medium_circle"
       cx="400"
       cy="300"
       r="130"
       style="fill:#ffcccc;stroke:#000000;stroke-width:2" />
    <!-- small_rect is on top (last in document) -->
    <rect
       id="small_rect"
       x="320"
       y="220"
       width="160"
       height="160"
       style="fill:#ccffcc;stroke:#000000;stroke-width:2" />
  </g>
</svg>
