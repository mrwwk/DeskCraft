<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1200"
   height="800"
   viewBox="0 0 1200 800"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   id="svg1">
  <sodipodi:namedview
     id="namedview1"
     inkscape:current-layer="layer_content" />
  <defs>
    <linearGradient id="header_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Layer: Background -->
  <g
     inkscape:label="Background"
     inkscape:groupmode="layer"
     id="layer_bg">
    <rect
       id="bg_fill"
       x="0" y="0" width="1200" height="800"
       style="fill:#f5f5f5;stroke:none" />
  </g>
  <!-- Layer: Header -->
  <g
     inkscape:label="Header"
     inkscape:groupmode="layer"
     id="layer_header">
    <rect
       id="header_bar"
       x="0" y="0" width="1200" height="120"
       style="fill:url(#header_gradient);stroke:none" />
    <text
       id="header_title"
       x="600" y="60"
       style="font-size:42px;font-family:sans-serif;fill:#ffffff;text-anchor:middle;dominant-baseline:middle">Annual Report 2024</text>
    <text
       id="header_subtitle"
       x="600" y="95"
       style="font-size:20px;font-family:sans-serif;fill:#ecf0f1;text-anchor:middle">Company Performance Overview</text>
  </g>
  <!-- Layer: Content -->
  <g
     inkscape:label="Content"
     inkscape:groupmode="layer"
     id="layer_content">
    <!-- Left column: info card -->
    <rect
       id="card_left"
       x="40" y="150" width="350" height="280"
       rx="12" ry="12"
       style="fill:#ffffff;stroke:#dddddd;stroke-width:1" />
    <text
       id="card_left_title"
       x="215" y="190"
       style="font-size:22px;font-family:sans-serif;fill:#2c3e50;text-anchor:middle;font-weight:bold">Revenue</text>
    <text
       id="card_left_value"
       x="215" y="280"
       style="font-size:56px;font-family:sans-serif;fill:#27ae60;text-anchor:middle;font-weight:bold">$4.2M</text>
    <text
       id="card_left_delta"
       x="215" y="330"
       style="font-size:18px;font-family:sans-serif;fill:#27ae60;text-anchor:middle">+18% vs last year</text>
    <!-- Center column: bar chart placeholder -->
    <rect
       id="card_center"
       x="420" y="150" width="350" height="280"
       rx="12" ry="12"
       style="fill:#ffffff;stroke:#dddddd;stroke-width:1" />
    <text
       id="card_center_title"
       x="595" y="190"
       style="font-size:22px;font-family:sans-serif;fill:#2c3e50;text-anchor:middle;font-weight:bold">Quarterly Sales</text>
    <rect id="bar_q1" x="460" y="280" width="50" height="120" style="fill:#3498db" />
    <rect id="bar_q2" x="530" y="240" width="50" height="160" style="fill:#3498db" />
    <rect id="bar_q3" x="600" y="210" width="50" height="190" style="fill:#3498db" />
    <rect id="bar_q4" x="670" y="250" width="50" height="150" style="fill:#3498db" />
    <text id="label_q1" x="485" y="415" style="font-size:14px;font-family:sans-serif;fill:#666;text-anchor:middle">Q1</text>
    <text id="label_q2" x="555" y="415" style="font-size:14px;font-family:sans-serif;fill:#666;text-anchor:middle">Q2</text>
    <text id="label_q3" x="625" y="415" style="font-size:14px;font-family:sans-serif;fill:#666;text-anchor:middle">Q3</text>
    <text id="label_q4" x="695" y="415" style="font-size:14px;font-family:sans-serif;fill:#666;text-anchor:middle">Q4</text>
    <!-- Right column: info card -->
    <rect
       id="card_right"
       x="800" y="150" width="350" height="280"
       rx="12" ry="12"
       style="fill:#ffffff;stroke:#dddddd;stroke-width:1" />
    <text
       id="card_right_title"
       x="975" y="190"
       style="font-size:22px;font-family:sans-serif;fill:#2c3e50;text-anchor:middle;font-weight:bold">Customers</text>
    <circle
       id="donut_outer"
       cx="975" cy="310" r="70"
       style="fill:#e74c3c;stroke:none" />
    <circle
       id="donut_inner"
       cx="975" cy="310" r="40"
       style="fill:#ffffff;stroke:none" />
    <text
       id="donut_label"
       x="975" y="320"
       style="font-size:24px;font-family:sans-serif;fill:#e74c3c;text-anchor:middle;font-weight:bold">12.5K</text>
  </g>
  <!-- Layer: Footer -->
  <g
     inkscape:label="Footer"
     inkscape:groupmode="layer"
     id="layer_footer">
    <rect
       id="footer_bar"
       x="0" y="750" width="1200" height="50"
       style="fill:#2c3e50;stroke:none" />
    <text
       id="footer_text"
       x="600" y="780"
       style="font-size:14px;font-family:sans-serif;fill:#95a5a6;text-anchor:middle">Confidential — Internal Use Only</text>
  </g>
</svg>
